<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material da Aula | Dra. Sandra Scalco</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1a0b2e;
  --dark2:#240E35;
  --purple:#59047c;
  --green1:#217D2A;
  --green2:#28A735;
  --white:#ffffff;
  --gray:#D6D6D6;
}
body{font-family:'Poppins',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at top center,rgba(89,4,124,.35) 0%,var(--dark) 65%);pointer-events:none;z-index:0}

.card{position:relative;z-index:1;width:100%;max-width:480px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:52px 44px}

.logo-bar{display:flex;align-items:center;justify-content:center;margin-bottom:36px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green2);margin-right:10px}
.logo-text{font-size:.7rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(214,214,214,.6)}

h1{font-size:1.25rem;font-weight:700;line-height:1.4;color:var(--white);margin-bottom:10px;text-align:center}
.sub{font-size:.9rem;color:var(--gray);line-height:1.75;text-align:center;margin-bottom:36px}

.form-group{margin-bottom:18px}
label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(214,214,214,.6);margin-bottom:8px}
input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:14px 18px;font-family:'Poppins',sans-serif;font-size:.95rem;color:var(--white);outline:none;transition:border-color .2s,background .2s}
input::placeholder{color:rgba(214,214,214,.35)}
input:focus{border-color:rgba(89,4,124,.8);background:rgba(255,255,255,.1)}
textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:14px 18px;font-family:'Poppins',sans-serif;font-size:.95rem;color:var(--white);outline:none;transition:border-color .2s,background .2s;resize:vertical;min-height:90px}
textarea::placeholder{color:rgba(214,214,214,.35)}
textarea:focus{border-color:rgba(89,4,124,.8);background:rgba(255,255,255,.1)}

.btn{display:block;width:100%;background:linear-gradient(90deg,var(--green1),var(--green2));color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.08em;text-transform:uppercase;padding:18px 40px;border-radius:6px;cursor:pointer;border:none;text-align:center;transition:transform .2s,box-shadow .2s;margin-top:28px}
.btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(40,167,53,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg-erro{display:none;margin-top:14px;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.35);border-radius:8px;padding:10px 16px;font-size:.82rem;color:#fca5a5;text-align:center}

@media(max-width:520px){
  .card{padding:40px 28px}
  h1{font-size:1.1rem}
}
</style>
</head>
<body>

<div class="card">
  <div class="logo-bar">
    <div class="logo-dot"></div>
    <div class="logo-text">Dra. Sandra Scalco</div>
  </div>

  <h1>Quer receber o material da aula que a Dra acabou de ministrar?</h1>
  <p class="sub">É só preencher o formulário abaixo e clicar no botão para acessar.</p>

  <form id="form-material">
    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Seu nome completo" required>
    </div>
    <div class="form-group">
      <label for="tel">Telefone</label>
      <input type="tel" id="tel" placeholder="(00) 00000-0000">
    </div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required>
    </div>
    <div class="form-group">
      <label for="formacao">Formação / Especialização / Áreas de interesse</label>
      <textarea id="formacao" placeholder="Ex: Psicologia, Medicina, Terapia de casal..."></textarea>
    </div>
    <div class="form-group">
      <label for="motivacao">O que te motiva a aprofundar o conhecimento na área da sexualidade?</label>
      <textarea id="motivacao" placeholder="Escreva sua resposta aqui..."></textarea>
    </div>
    <button type="submit" class="btn" id="btn-submit">ACESSAR MATERIAL</button>
    <div class="msg-erro" id="msg-erro">Ocorreu um erro. Tente novamente.</div>
  </form>
</div>

<script>
const APPS_SCRIPT_URL = 'COLE_AQUI_A_URL_DO_APPS_SCRIPT';
const MATERIAIS_URL   = 'https://docs.google.com/spreadsheets/d/1X9kXFPw1tDqxRCkepqHlc1R9_ujqk6MUraOdOtjzAq8/edit?gid=0#gid=0';

document.getElementById('form-material').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn     = document.getElementById('btn-submit');
  const msgErro = document.getElementById('msg-erro');

  btn.disabled     = true;
  btn.textContent  = 'Enviando...';
  msgErro.style.display = 'none';

  const dados = {
    nome:      document.getElementById('nome').value.trim(),
    telefone:  document.getElementById('tel').value.trim(),
    email:     document.getElementById('email').value.trim(),
    formacao:  document.getElementById('formacao').value.trim(),
    motivacao: document.getElementById('motivacao').value.trim()
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados)
    });
    window.location.href = MATERIAIS_URL;
  } catch (err) {
    btn.disabled    = false;
    btn.textContent = 'ACESSAR MATERIAL';
    msgErro.style.display = 'block';
  }
});
</script>
</body>
</html>
